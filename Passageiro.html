<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RideApp — Passageiro</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }

    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 24px; background: #1a1a2e; color: white; font-weight: 600;
    }
    .btn-sair {
      background: transparent; border: 1px solid rgba(255,255,255,0.4);
      color: white; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
    }

    .corpo { display: flex; flex: 1; overflow: hidden; }
    #mapa { flex: 1; }

    aside {
      width: 300px; background: white; padding: 20px;
      display: flex; flex-direction: column; gap: 14px;
      box-shadow: -2px 0 12px rgba(0,0,0,0.1); overflow-y: auto;
    }
    aside h2 { font-size: 18px; }

    .info-destino {
      background: #eff6ff; border: 1px solid #bfdbfe;
      border-radius: 8px; padding: 12px; font-size: 13px; color: #1d4ed8;
    }

    select, input {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid #e5e7eb; border-radius: 8px; font-size: 14px;
    }
    label { font-size: 13px; font-weight: 600; color: #374151; }

    .btn-solicitar {
      padding: 14px; background: #2563eb; color: white;
      border: none; border-radius: 8px; font-size: 15px;
      font-weight: 700; cursor: pointer; transition: background 0.2s;
    }
    .btn-solicitar:hover:not(:disabled) { background: #1d4ed8; }
    .btn-solicitar:disabled { background: #93c5fd; cursor: not-allowed; }

    .status-box {
      text-align: center; padding: 20px;
      background: #f0fdf4; border: 1px solid #bbf7d0;
      border-radius: 10px;
    }
    .status-box.azul { background: #eff6ff; border-color: #bfdbfe; }
    .status-box.amarelo { background: #fffbeb; border-color: #fde68a; }
    .status-box.cinza { background: #f9fafb; border-color: #e5e7eb; }

    .spinner {
      width: 36px; height: 36px; border: 3px solid #e5e7eb;
      border-top-color: #2563eb; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-cancelar {
      margin-top: 10px; width: 100%; padding: 10px;
      background: transparent; color: #dc2626;
      border: 1px solid #dc2626; border-radius: 8px; cursor: pointer;
    }
    .btn-secundario {
      margin-top: 10px; width: 100%; padding: 10px;
      background: #2563eb; color: white;
      border: none; border-radius: 8px; cursor: pointer; font-weight: 600;
    }

    .info-motorista { text-align: left; font-size: 13px; color: #374151; margin-top: 8px; }
    .info-motorista p { margin-bottom: 4px; }

    hr { border: none; border-top: 1px solid #e5e7eb; }
    .link-hist {
      text-align: center; color: #2563eb; text-decoration: none;
      font-size: 14px; padding: 10px;
      border: 1px solid #dbeafe; border-radius: 8px; background: #eff6ff;
      display: block;
    }
    .lista-proximos { font-size: 12px; color: #6b7280; }
    .oculto { display: none !important; }
  </style>
</head>
<body>

<header>
  <span>🚖 RideApp — Passageiro</span>
  <button class="btn-sair" onclick="sair()">Sair</button>
</header>

<div class="corpo">
  <div id="mapa"></div>

  <aside>
    <h2>Para onde vamos?</h2>

    <!-- Estado: escolhendo destino -->
    <div id="painel-escolha">
      <p class="info-destino" id="info-destino">Clique no mapa para escolher o destino</p>
      <p class="lista-proximos" id="info-proximos">Procurando motoristas próximos...</p>
      <label>Pagamento</label>
      <select id="pagamento">
        <option value="dinheiro">💵 Dinheiro</option>
        <option value="pix">📱 PIX</option>
        <option value="cartao">💳 Cartão</option>
      </select>
      <button class="btn-solicitar" id="btn-solicitar" onclick="solicitar()" disabled>
        Solicitar corrida
      </button>
    </div>

    <!-- Estado: corrida em andamento (conteúdo dinâmico) -->
    <div id="painel-status" class="oculto">
      <div class="status-box" id="status-box-conteudo"></div>
    </div>

    <hr/>
    <a href="historico.html" class="link-hist">📋 Histórico de viagens</a>
  </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, doc, updateDoc, onSnapshot, getDoc, query, where }
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBu6LwKxIOxx-gTFIPYOJrjFqU0Kpj98HI",
    authDomain: "meu-app-passageiro.firebaseapp.com",
    databaseURL: "https://meu-app-passageiro-default-rtdb.firebaseio.com",
    projectId: "meu-app-passageiro",
    storageBucket: "meu-app-passageiro.firebasestorage.app",
    messagingSenderId: "638222729850",
    appId: "1:638222729850:web:b2ce8c66bc7de8612731c3"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let usuario = null;
  let destino = null;
  let corridaId = null;
  let corridaUnsub = null;
  let motoristaMarcador = null;
  const cacheMotoristas = {};
  const origem = { lat: -23.5505, lng: -46.6333 }; // São Paulo

  // Verifica se está logado
  onAuthStateChanged(auth, (u) => {
    if (!u) { window.location.href = "index.html"; return; }
    usuario = u;
  });

  // Monta o mapa
  const mapa = L.map("mapa").setView([origem.lat, origem.lng], 13);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a>'
  }).addTo(mapa);

  // Marca origem (você)
  L.marker([origem.lat, origem.lng])
    .addTo(mapa)
    .bindPopup("📍 Você está aqui")
    .openPopup();

  let marcadorDestino = null;
  const camadaMotoristas = L.layerGroup().addTo(mapa);

  // Clique no mapa seleciona destino
  mapa.on("click", (e) => {
    if (corridaId) return; // não permite trocar destino com corrida ativa
    destino = { lat: e.latlng.lat, lng: e.latlng.lng };
    if (marcadorDestino) mapa.removeLayer(marcadorDestino);
    marcadorDestino = L.marker([destino.lat, destino.lng])
      .addTo(mapa)
      .bindPopup("🏁 Destino")
      .openPopup();
    document.getElementById("info-destino").textContent =
      `✅ Destino: ${destino.lat.toFixed(4)}, ${destino.lng.toFixed(4)}`;
    document.getElementById("btn-solicitar").disabled = false;
  });

  // ----- Motoristas próximos (online e aprovados) -----
  const carroIcon = L.divIcon({ html: "🚗", className: "", iconSize: [24, 24] });

  onSnapshot(query(collection(db, "motoristas"), where("aprovado", "==", true)), (snap) => {
    const agora = Date.now();
    camadaMotoristas.clearLayers();
    let visiveis = 0;
    snap.docs.forEach(d => {
      const m = d.data();
      cacheMotoristas[d.id] = m;
      if (!m.localizacao || !m.localizacao.atualizadoEm) return;
      if (agora - m.localizacao.atualizadoEm > 3 * 60 * 1000) return; // só motoristas online (últimos 3min)
      if (corridaId) return; // some com a lista quando já tem corrida ativa
      visiveis++;
      L.marker([m.localizacao.lat, m.localizacao.lng], { icon: carroIcon })
        .addTo(camadaMotoristas)
        .bindPopup(`🚗 ${m.nome || "Motorista"}${m.notaMedia ? " — ⭐ " + m.notaMedia.toFixed(1) : ""}`);
    });
    if (!corridaId) {
      document.getElementById("info-proximos").textContent = visiveis > 0
        ? `🚗 ${visiveis} motorista(s) próximo(s) agora`
        : "Nenhum motorista online no momento";
    }
  });

  window.solicitar = async () => {
    if (!destino || !usuario) return;
    document.getElementById("btn-solicitar").disabled = true;
    document.getElementById("btn-solicitar").textContent = "Solicitando...";
    const pagamento = document.getElementById("pagamento").value;
    const docRef = await addDoc(collection(db, "corridas"), {
      passageiroId: usuario.uid,
      motoristaId: null,
      origemLat: origem.lat, origemLng: origem.lng,
      destinoLat: destino.lat, destinoLng: destino.lng,
      enderecoDestino: `${destino.lat.toFixed(4)}, ${destino.lng.toFixed(4)}`,
      status: "procurando",
      formaPagamento: pagamento,
      valor: null,
      criadoEm: Date.now(),
    });
    corridaId = docRef.id;
    camadaMotoristas.clearLayers();
    document.getElementById("painel-escolha").classList.add("oculto");
    document.getElementById("painel-status").classList.remove("oculto");
    escutarCorridaAtual(corridaId);
  };

  function escutarCorridaAtual(id) {
    if (corridaUnsub) corridaUnsub();
    corridaUnsub = onSnapshot(doc(db, "corridas", id), async (snap) => {
      if (!snap.exists()) return;
      const c = snap.data();
      await renderizarStatus(c);
    });
  }

  async function renderizarStatus(c) {
    const box = document.getElementById("status-box-conteudo");
    box.className = "status-box";

    if (c.status === "procurando") {
      box.innerHTML = `
        <div class="spinner"></div>
        <p><strong>Procurando motorista...</strong></p>
        <small>ID: ${corridaId}</small>
        <button class="btn-cancelar" onclick="cancelar()">Cancelar corrida</button>`;
      if (motoristaMarcador) { mapa.removeLayer(motoristaMarcador); motoristaMarcador = null; }
      return;
    }

    if (c.status === "aceita" || c.status === "em_andamento") {
      box.classList.add(c.status === "aceita" ? "azul" : "amarelo");
      let mot = cacheMotoristas[c.motoristaId];
      if (!mot && c.motoristaId) {
        const ms = await getDoc(doc(db, "motoristas", c.motoristaId));
        mot = ms.exists() ? ms.data() : {};
        cacheMotoristas[c.motoristaId] = mot;
      }
      mot = mot || {};
      const titulo = c.status === "aceita" ? "🚗 Motorista a caminho" : "🛣️ Em viagem";
      box.innerHTML = `
        <p><strong>${titulo}</strong></p>
        <div class="info-motorista">
          <p>👤 ${mot.nome || "—"}</p>
          <p>📞 ${mot.telefone || "—"}</p>
          <p>🚘 ${mot.modeloVeiculo || "—"} ${mot.corVeiculo ? "(" + mot.corVeiculo + ")" : ""}</p>
          <p>🔢 Placa: ${mot.placa || "—"}</p>
          ${mot.notaMedia ? `<p>⭐ ${mot.notaMedia.toFixed(1)} (${mot.totalAvaliacoes || 0} avaliações)</p>` : ""}
        </div>
        ${c.status === "aceita" ? '<button class="btn-cancelar" onclick="cancelar()">Cancelar corrida</button>' : ""}`;

      if (c.motoristaLat && c.motoristaLng) {
        if (motoristaMarcador) {
          motoristaMarcador.setLatLng([c.motoristaLat, c.motoristaLng]);
        } else {
          motoristaMarcador = L.marker([c.motoristaLat, c.motoristaLng], { icon: carroIcon })
            .addTo(mapa).bindPopup("🚗 Motorista");
        }
      }
      return;
    }

    if (c.status === "finalizada") {
      box.classList.add("cinza");
      box.innerHTML = `
        <p style="font-size:28px;">🏁</p>
        <p><strong>Corrida finalizada!</strong></p>
        <p style="margin:8px 0; font-size:14px;">${c.valor ? "Valor: R$ " + c.valor.toFixed(2) : ""}</p>
        <a href="historico.html" class="btn-secundario" style="display:block; text-decoration:none; box-sizing:border-box;">⭐ Avaliar motorista</a>
        <button class="btn-cancelar" style="color:#374151; border-color:#374151;" onclick="novaCorrida()">Nova corrida</button>`;
      if (motoristaMarcador) { mapa.removeLayer(motoristaMarcador); motoristaMarcador = null; }
      return;
    }

    if (c.status === "cancelada") {
      box.classList.add("cinza");
      box.innerHTML = `
        <p><strong>❌ Corrida cancelada</strong></p>
        <button class="btn-secundario" onclick="novaCorrida()">Nova corrida</button>`;
      if (motoristaMarcador) { mapa.removeLayer(motoristaMarcador); motoristaMarcador = null; }
    }
  }

  function resetEstado() {
    if (corridaUnsub) { corridaUnsub(); corridaUnsub = null; }
    if (motoristaMarcador) { mapa.removeLayer(motoristaMarcador); motoristaMarcador = null; }
    document.getElementById("painel-escolha").classList.remove("oculto");
    document.getElementById("painel-status").classList.add("oculto");
    document.getElementById("btn-solicitar").disabled = false;
    document.getElementById("btn-solicitar").textContent = "Solicitar corrida";
    destino = null; corridaId = null;
    if (marcadorDestino) { mapa.removeLayer(marcadorDestino); marcadorDestino = null; }
    document.getElementById("info-destino").textContent = "Clique no mapa para escolher o destino";
  }

  window.cancelar = async () => {
    if (corridaId) {
      await updateDoc(doc(db, "corridas", corridaId), { status: "cancelada" });
    }
  };

  window.novaCorrida = () => resetEstado();

  window.sair = async () => {
    await signOut(auth);
    window.location.href = "index.html";
  };
</script>
</body>
</html>
