<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RideApp — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo { font-size: 52px; text-align: center; }
    h1 { text-align: center; font-size: 24px; margin: 8px 0 24px; }

    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab {
      flex: 1; padding: 8px 4px;
      border: 2px solid #e5e7eb;
      background: white; border-radius: 8px;
      cursor: pointer; font-size: 12px; font-weight: 600;
      transition: all 0.2s;
    }
    .tab.ativo { border-color: #2563eb; background: #eff6ff; color: #2563eb; }

    .modos { display: flex; gap: 8px; margin-bottom: 16px; }
    .modo-btn {
      flex: 1; padding: 8px;
      border: 1px solid #e5e7eb; background: white;
      border-radius: 6px; cursor: pointer; font-size: 13px;
      transition: all 0.2s;
    }
    .modo-btn.ativo { background: #1a1a2e; color: white; border-color: #1a1a2e; }

    .form { display: flex; flex-direction: column; gap: 12px; }
    .form input {
      padding: 12px 14px;
      border: 1.5px solid #e5e7eb; border-radius: 8px;
      font-size: 15px; outline: none;
      transition: border-color 0.2s;
    }
    .form input:focus { border-color: #2563eb; }

    .btn-entrar {
      padding: 14px; background: #2563eb; color: white;
      border: none; border-radius: 8px; font-size: 15px;
      font-weight: 700; cursor: pointer; transition: background 0.2s;
    }
    .btn-entrar:hover { background: #1d4ed8; }
    .btn-entrar:disabled { background: #93c5fd; cursor: not-allowed; }

    .link { display: block; text-align: center; margin-top: 12px;
      color: #2563eb; cursor: pointer; font-size: 14px; text-decoration: underline;
      background: none; border: none; width: 100%;
    }
    .erro { color: #dc2626; font-size: 13px; text-align: center; }
    .oculto { display: none !important; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">🚖</div>
  <h1>RideApp</h1>

  <!-- Seletor de perfil -->
  <div class="tabs">
    <button class="tab ativo" onclick="selecionarPerfil('passageiro', this)">🧑 Passageiro</button>
    <button class="tab" onclick="selecionarPerfil('motorista', this)">🚗 Motorista</button>
    <button class="tab" onclick="selecionarPerfil('admin', this)">⚙️ Admin</button>
  </div>

  <!-- Login / Cadastro -->
  <div class="modos">
    <button class="modo-btn ativo" onclick="selecionarModo('login', this)">Entrar</button>
    <button class="modo-btn" onclick="selecionarModo('cadastro', this)">Cadastrar</button>
  </div>

  <div class="form">
    <div id="campo-nome" class="oculto">
      <input id="nome" type="text" placeholder="Nome completo" />
    </div>
    <div id="campo-telefone" class="oculto">
      <input id="telefone" type="tel" placeholder="Telefone (com DDD)" />
    </div>
    <input id="email" type="email" placeholder="E-mail" />
    <input id="senha" type="password" placeholder="Senha" />
    <p id="erro" class="erro oculto"></p>
    <button class="btn-entrar" id="btn-entrar" onclick="entrar()">Entrar</button>
  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword }
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getFirestore, doc, setDoc }
    from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBu6LwKxIOxx-gTFIPYOJrjFqU0Kpj98HI",
    authDomain: "meu-app-passageiro.firebaseapp.com",
    databaseURL: "https://meu-app-passageiro-default-rtdb.firebaseio.com",
    projectId: "meu-app-passageiro",
    storageBucket: "meu-app-passageiro.firebasestorage.app",
    messagingSenderId: "638222729850",
    appId: "1:638222729850:web:b2ce8c66bc7de8612731c3"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let perfil = "passageiro";
  let modo = "login";

  window.selecionarPerfil = (p, el) => {
    perfil = p;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("ativo"));
    el.classList.add("ativo");
  };

  window.selecionarModo = (m, el) => {
    modo = m;
    document.querySelectorAll(".modo-btn").forEach(b => b.classList.remove("ativo"));
    el.classList.add("ativo");
    document.getElementById("campo-nome").classList.toggle("oculto", m === "login");
    document.getElementById("campo-telefone").classList.toggle("oculto", m === "login");
    document.getElementById("btn-entrar").textContent = m === "login" ? "Entrar" : "Cadastrar";
  };

  window.entrar = async () => {
    const email = document.getElementById("email").value.trim();
    const senha = document.getElementById("senha").value;
    const erroEl = document.getElementById("erro");
    const btn = document.getElementById("btn-entrar");
    erroEl.classList.add("oculto");
    btn.disabled = true;
    btn.textContent = "Aguarde...";

    try {
      if (modo === "login") {
        await signInWithEmailAndPassword(auth, email, senha);
      } else {
        const nome = document.getElementById("nome").value.trim();
        const telefone = document.getElementById("telefone").value.trim();
        const cred = await createUserWithEmailAndPassword(auth, email, senha);
        const colecao = perfil === "admin" ? "admins" : perfil + "s";
        await setDoc(doc(db, colecao, cred.user.uid), { nome, email, telefone, perfil, criadoEm: Date.now() });
      }
      // Redireciona para o painel correto
      window.location.href = perfil + ".html";
    } catch (err) {
      erroEl.textContent = traduzirErro(err.code);
      erroEl.classList.remove("oculto");
      btn.disabled = false;
      btn.textContent = modo === "login" ? "Entrar" : "Cadastrar";
    }
  };

  function traduzirErro(code) {
    const erros = {
      "auth/email-already-in-use": "E-mail já cadastrado.",
      "auth/invalid-email": "E-mail inválido.",
      "auth/weak-password": "Senha precisa ter pelo menos 6 caracteres.",
      "auth/invalid-credential": "E-mail ou senha incorretos.",
      "auth/user-not-found": "E-mail ou senha incorretos.",
    };
    return erros[code] || "Erro inesperado. Tente novamente.";
  }
</script>
</body>
</html>
